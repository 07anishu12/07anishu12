<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium GitHub Profile Banners Preview 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(15, 23, 42, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #22d3ee;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-theme {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.8);
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --text-muted: #475569;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 800px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #22d3ee, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    body.light-theme header h1 {
      background: linear-gradient(135deg, #2563eb, #06b6d4, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      background: var(--card-bg);
      padding: 0.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(34, 211, 238, 0.25);
    }

    body.light-theme .btn.active {
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .container {
      width: 100%;
      max-width: 1220px;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .preview-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      transition: var(--transition);
    }

    body.light-theme .preview-card {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .preview-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-dark {
      background: rgba(124, 58, 237, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    .badge-light {
      background: rgba(37, 99, 235, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(37, 99, 235, 0.2);
    }

    .svg-wrapper {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1180 / 610;
      background: #030712;
      border: 1px solid var(--border);
    }

    body.light-theme .svg-wrapper.light-bg {
      background: #ffffff;
    }

    .svg-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }

    footer {
      margin-top: 4rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Premium Profile README Banners</h1>
    <p>Pure SVG • SMIL Animations • Theme Adaptive Banners for 07anishu12</p>
  </header>

  <div class="controls">
    <button class="btn active" id="btn-dark" onclick="toggleTheme('dark')">Dark Theme View</button>
    <button class="btn" id="btn-light" onclick="toggleTheme('light')">Light Theme View</button>
  </div>

  <div class="container">
    <!-- Dark Mode Banner Card -->
    <div class="preview-card" id="card-dark">
      <div class="preview-header">
        <div class="preview-title">
          <span>🌌 Dark Mode Banner</span>
          <span class="preview-badge badge-dark">dark.svg</span>
        </div>
      </div>
      <div class="svg-wrapper">
        <img src="dark.svg" alt="Dark Mode Banner">
      </div>
    </div>

    <!-- Light Mode Banner Card -->
    <div class="preview-card" id="card-light" style="display: none;">
      <div class="preview-header">
        <div class="preview-title">
          <span>☀️ Light Mode Banner</span>
          <span class="preview-badge badge-light">light.svg</span>
        </div>
      </div>
      <div class="svg-wrapper light-bg">
        <img src="light.svg" alt="Light Mode Banner">
      </div>
    </div>
  </div>

  <footer>
    Designed with ❤️ by Antigravity | Previews run locally for verification.
  </footer>

  <script>
    function toggleTheme(theme) {
      const body = document.body;
      const btnDark = document.getElementById('btn-dark');
      const btnLight = document.getElementById('btn-light');
      const cardDark = document.getElementById('card-dark');
      const cardLight = document.getElementById('card-light');

      if (theme === 'dark') {
        body.classList.remove('light-theme');
        btnDark.classList.add('active');
        btnLight.classList.remove('active');
        cardDark.style.display = 'block';
        cardLight.style.display = 'none';
      } else {
        body.classList.add('light-theme');
        btnDark.classList.remove('active');
        btnLight.classList.add('active');
        cardDark.style.display = 'none';
        cardLight.style.display = 'block';
      }
    }
  </script>
</body>
</html>
